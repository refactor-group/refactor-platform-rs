# Main nginx configuration for containerized deployment
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Rate limiting (edge backstop for auth/credential-recovery endpoints)
    #
    # Coarse per-IP flood limiter applied at the proxy, in front of ALL
    # backend instances. This is the OUTERMOST of three layers; it is
    # deliberately looser than the in-process app limit so it only sheds
    # gross abuse before it reaches the Rust process, while the precise
    # per-route and per-email policies live in the backend:
    #   1. (here) nginx limit_req  — per-IP, fleet-wide, ~30 req/min
    #   2. PerIpThrottle (governor) — per-IP, per-process, ~10 req/min
    #   3. password_reset_attempts  — per-email-hash (min-interval + daily cap)
    # See docs/architecture/throttling.md and password_reset.md.
    #
    # $binary_remote_addr is correct only while this nginx is the edge
    # (it terminates TLS here). If you put a load balancer / Cloudflare in
    # front, switch the key to the real client IP via the real_ip module:
    #   set_real_ip_from <trusted-proxy-cidr>;
    #   real_ip_header X-Forwarded-For;  # or CF-Connecting-IP
    # then $binary_remote_addr resolves to the true client again.
    #
    # 10m zone holds ~160k distinct IPs. Named generically so future auth
    # endpoints (login, signup) can reuse it.
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;
    limit_req_status 429;

    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Buffer settings for better performance
    client_body_buffer_size 128k;
    client_max_body_size 50m;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 4k;
    output_buffers 1 32k;
    postpone_output 1460;

    # SSL configuration defaults
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES128-SHA:ECDHE-RSA-AES256-SHA:DHE-RSA-AES128-SHA256:DHE-RSA-AES256-SHA256:DHE-RSA-AES128-SHA:DHE-RSA-AES256-SHA:!aNULL:!eNULL:!EXPORT:!DES:!RC4:!MD5:!PSK:!SRP:!CAMELLIA;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Include site-specific configurations
    include /etc/nginx/conf.d/*.conf;
}
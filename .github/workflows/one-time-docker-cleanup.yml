# TEMPORARY: One-time aggressive Docker cleanup on RPi5
# Stops ALL pr-* compose projects, prunes everything, then verifies
# Remove this workflow after running it once successfully
name: One-Time Docker Cleanup

on:
    workflow_dispatch:

jobs:
    cleanup:
        name: Aggressive Docker Cleanup on RPi5
        runs-on: [self-hosted, Linux, ARM64, neo]
        steps:
            - name: Show state before cleanup
              run: |
                  echo "=== Docker disk usage BEFORE ==="
                  docker system df
                  echo ""
                  echo "=== Running containers ==="
                  docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}' | head -50
                  echo ""
                  echo "=== Network count ==="
                  docker network ls -q | wc -l

            - name: Stop and remove ALL pr-* compose projects
              run: |
                  echo "=== Tearing down all PR preview stacks ==="
                  for project in $(docker compose ls -a --format json | jq -r '.[].Name'); do
                      if [[ "$project" == pr-* ]]; then
                          echo "Stopping project: $project"
                          # Find the compose file for this project
                          PR_NUM="${project#pr-}"
                          COMPOSE_FILE="/home/$(whoami)/pr-${PR_NUM}-compose.yaml"
                          if [[ -f "$COMPOSE_FILE" ]]; then
                              docker compose -p "$project" -f "$COMPOSE_FILE" down -v --remove-orphans 2>&1 || true
                              rm -f "$COMPOSE_FILE"
                          else
                              # No compose file — force remove containers
                              docker ps -a --filter "name=${project}" --format '{{.ID}}' | xargs -r docker rm -f 2>&1 || true
                          fi
                          echo "  Done: $project"
                      fi
                  done
                  echo ""
                  echo "=== Remaining compose projects ==="
                  docker compose ls -a 2>&1 || true

            - name: Remove any remaining pr-* containers
              run: |
                  echo "=== Force removing any remaining pr-* containers ==="
                  docker ps -a --filter "name=pr-" --format '{{.ID}} {{.Names}}' | while read id name; do
                      echo "Removing: $name ($id)"
                      docker rm -f "$id" 2>&1 || true
                  done

            - name: Prune everything
              run: |
                  echo "=== Pruning stopped containers ==="
                  docker container prune -f
                  echo ""
                  echo "=== Pruning unused networks ==="
                  docker network prune -f
                  echo ""
                  echo "=== Pruning unused volumes ==="
                  docker volume prune -f
                  echo ""
                  echo "=== Pruning images older than 7 days (168h) ==="
                  docker image prune -a -f --filter "until=168h"
                  echo ""
                  echo "=== Pruning dangling images ==="
                  docker image prune -f

            - name: Clean up leftover compose files
              run: |
                  echo "=== Removing leftover pr-*-compose.yaml files ==="
                  ls -la ~/pr-*-compose.yaml 2>/dev/null || echo "No leftover compose files"
                  rm -f ~/pr-*-compose.yaml 2>/dev/null || true

            - name: Show state after cleanup
              run: |
                  echo "=== Docker disk usage AFTER ==="
                  docker system df
                  echo ""
                  echo "=== Running containers ==="
                  docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Status}}'
                  echo ""
                  echo "=== All networks ==="
                  docker network ls
                  echo ""
                  echo "=== Remaining images ==="
                  docker images --format 'table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedSince}}'

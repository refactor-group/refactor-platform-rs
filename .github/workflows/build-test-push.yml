name: Build, Test & Push to GHCR

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Cancel in-progress runs for the same branch when a new commit lands.
# Main is exempt: a deploy mid-merge shouldn't be killed by the next PR merge.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # sccache + incremental compilation are mutually exclusive — sccache caches
  # whole-crate codegen units, while incremental layers per-edit deltas on top
  # of an already-built crate. Disable incremental so sccache can do its job.
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Wire sccache as the rustc wrapper in every job that compiles Rust.
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  # === LINT JOB (Fast Feedback) ===
  # BATS suite for the dispatch resolver runs as the first step of lint so
  # a regex regression fails before clippy/test/docker eat their full
  # runtime. Keeps the Actions sidebar uncluttered (no separate "bats" job).
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install bats
        run: sudo apt-get update && sudo apt-get install -y bats

      - name: Run dispatch-workflow regex tests (bats)
        run: bats .github/workflows/tests/dispatch-pr-preview.bats

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Use cached dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "main"
          key: "lint"
          cache-all-crates: true

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run clippy (mock feature)
        run: cargo clippy -p entity_api -p domain -p web --all-targets --features "domain/mock,web/mock" -- -D warnings

      - name: Run format check
        run: cargo fmt --all -- --check

      - name: Show sccache stats
        run: sccache --show-stats

  # === TEST JOB ===
  test:
    name: Build & Test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      - name: Set OpenSSL Paths
        run: |
          echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/x86_64-linux-gnu" >> $GITHUB_ENV

      - name: Run sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Use cached dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "main"
          key: "test"
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}


      - name: Build
        run: cargo build --all-targets

      - name: Run tests
        run: cargo test

      - name: Run mock-gated tests
        run: cargo test -p entity_api -p domain -p web --features "domain/mock,web/mock"

      - name: Show sccache stats
        run: sccache --show-stats

  # === DOCKER BUILD & PUSH JOB ===
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-24.04
    needs: [lint, test]  # Only run if lint and test pass
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Image Tags
        id: tags
        run: |
          BRANCH_NAME=${GITHUB_HEAD_REF:-${GITHUB_REF##*/}}
          IMAGE_NAME="${{ env.REGISTRY }}/${{ github.repository }}/${BRANCH_NAME}"
          echo "backend_tags=$IMAGE_NAME:latest,$IMAGE_NAME:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "backend_image_name=$IMAGE_NAME" >> $GITHUB_OUTPUT
          DOCS_COLLAB_IMAGE_NAME="${IMAGE_NAME}/docs-collab"
          echo "docs_collab_tags=$DOCS_COLLAB_IMAGE_NAME:latest,$DOCS_COLLAB_IMAGE_NAME:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "docs_collab_image_name=$DOCS_COLLAB_IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Build and Push Backend Image
        id: push_backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          tags: ${{ steps.tags.outputs.backend_tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Refactor Platform Backend
            org.opencontainers.image.description=Rust backend for refactor coaching platform
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and Push docs-collab Image
        id: push_docs_collab
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docs-collab-server/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: true
          tags: ${{ steps.tags.outputs.docs_collab_tags }}
          cache-from: type=gha,scope=docs-collab
          cache-to: type=gha,scope=docs-collab,mode=max
          labels: |
            org.opencontainers.image.title=Refactor Platform docs-collab-server
            org.opencontainers.image.description=Self-hosted collaborative document server
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Attest Backend Build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.backend_image_name }}
          subject-digest: ${{ steps.push_backend.outputs.digest }}
          push-to-registry: true

      - name: Print Usage Instructions
        run: |
          echo "🎉 Build, Test & Push completed successfully!"
          echo ""
          echo "📦 Backend Image Pushed:"
          echo "  docker pull ${{ steps.tags.outputs.backend_image_name }}:latest"
          echo "  docker pull ${{ steps.tags.outputs.backend_image_name }}:${{ github.sha }}"
          echo ""
          echo "📦 docs-collab Image Pushed:"
          echo "  docker pull ${{ steps.tags.outputs.docs_collab_image_name }}:latest"
          echo ""
          echo "🚀 Run Backend:"
          echo "  docker run --rm --env-file .env -p ${{ vars.BACKEND_PORT || '4000' }}:${{ vars.BACKEND_PORT || '4000' }} ${{ steps.tags.outputs.backend_image_name }}:latest"

# =============================================================================
# PR Preview Deployment Workflow (DISABLED - Use pr-preview-backend.yml instead)
# =============================================================================
# Purpose: Deploys isolated PR preview environments to RPi5 via Tailscale
# Features: ARM64 native builds, multi-tier caching, secure VPN deployment
# Target: Raspberry Pi 5 (ARM64) with Docker Compose via Tailscale SSH
# =============================================================================
# TEMPORARILY DISABLED - Uncommented the pull_request trigger
# This workflow is temporarily disabled to prevent automatic runs
# Use pr-preview-backend.yml for PR preview deployments
# =============================================================================

name: Deploy PR Preview to RPi5

# Define when this workflow should run automatically or manually
on:
  # TEMPORARILY DISABLED - PR trigger commented out
  # pull_request:
  #   types: [opened, synchronize, reopened]
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      backend_branch:
        description: "Backend branch to deploy"
        required: true
        default: "main"
        type: string
      pr_number:
        description: "PR number (auto-detected for PR triggers)"
        required: false
        type: string
      force_rebuild:
        description: "Force rebuild without cache"
        required: false
        default: false
        type: boolean

# Prevent multiple deployments for the same PR from running simultaneously
concurrency:
  group: preview-deploy-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Define what GitHub resources this workflow can access
permissions:
  contents: read
  packages: write
  pull-requests: write
  attestations: write
  id-token: write

# Set environment variables that apply to all jobs in this workflow
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ===========================================================================
  # JOB 1: Lint & Format Check
  # ===========================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-24.04
    environment: pr-preview

    env:
      CARGO_TERM_COLOR: ${{ vars.CARGO_TERM_COLOR }}
      CARGO_INCREMENTAL: ${{ vars.CARGO_INCREMENTAL }}
      RUST_BACKTRACE: ${{ vars.RUST_BACKTRACE }}

    steps:
      # Get the source code for this PR/branch
      - name: Checkout
        uses: actions/checkout@v4

      # Install Rust with clippy and rustfmt tools for code quality checks
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      # Speed up builds by using cached Rust dependencies
      - name: Use cached dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "pr-preview"
          key: "lint"
          cache-all-crates: true

      # Check code quality and common mistakes with clippy
      - name: Run clippy
        run: cargo clippy --all-targets

      # Check if code follows Rust formatting standards
      - name: Run format check
        run: cargo fmt --all -- --check || echo "::warning::Code formatting issues found. Run 'cargo fmt --all' locally to fix."
        continue-on-error: true

  # ===========================================================================
  # JOB 2: Build & Test
  # ===========================================================================
  test:
    name: Build & Test
    runs-on: ubuntu-24.04
    environment: pr-preview

    env:
      CARGO_TERM_COLOR: ${{ vars.CARGO_TERM_COLOR }}
      CARGO_INCREMENTAL: ${{ vars.CARGO_INCREMENTAL }}
      RUST_BACKTRACE: ${{ vars.RUST_BACKTRACE }}

    steps:
      # Get the source code for this PR/branch
      - name: Checkout
        uses: actions/checkout@v4

      # Install Rust compiler for x86_64 Linux (GitHub runner architecture)
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-unknown-linux-gnu

      # Configure OpenSSL paths for compilation on Ubuntu
      - name: Set OpenSSL Paths
        run: |
          echo "OPENSSL_LIB_DIR=/usr/lib/x86_64-linux-gnu" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=/usr/include/x86_64-linux-gnu" >> $GITHUB_ENV

      # Speed up builds by using cached Rust dependencies
      - name: Use cached dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "pr-preview"
          key: "test"
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' }}

      # Compile all Rust code to check for compilation errors
      - name: Build
        run: cargo build --all-targets

      # Run the test suite to ensure code works correctly
      - name: Run tests
        run: cargo test

  # ===========================================================================
  # JOB 3: Native ARM64 Image Build On Neo (aka "The One")
  # ===========================================================================
  build-arm64-image:
    name: Build ARM64 Backend Image
    runs-on: [self-hosted, Linux, ARM64, neo]
    environment: pr-preview
    needs: [lint, test]

    outputs:
      pr_number: ${{ steps.context.outputs.pr_number }}
      image_tag_pr: ${{ steps.context.outputs.image_tag_pr }}
      image_tag_sha: ${{ steps.context.outputs.image_tag_sha }}
      backend_branch: ${{ steps.context.outputs.backend_branch }}
      is_native_arm64: ${{ steps.context.outputs.is_native_arm64 }}

    steps:
      # Figure out PR number, branch, and image tags for this deployment
      - name: Set Deployment Context
        id: context
        run: |
          if [[ "$(uname -m)" == "aarch64" ]]; then
            echo "is_native_arm64=true" >> $GITHUB_OUTPUT
            echo "::notice::🚀 Running on native ARM64 runner (Neo)"
          else
            echo "::error::Not running on ARM64 architecture - check runner configuration"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            BACKEND_BRANCH="${{ github.head_ref }}"
          else
            PR_NUM="${{ inputs.pr_number }}"
            if [[ -z "$PR_NUM" ]]; then
              PR_NUM=$((9000 + ${{ github.run_number }}))
            fi
            BACKEND_BRANCH="${{ inputs.backend_branch }}"
          fi

          echo "pr_number=${PR_NUM}" >> $GITHUB_OUTPUT
          echo "backend_branch=${BACKEND_BRANCH}" >> $GITHUB_OUTPUT
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          IMAGE_TAG_PR="${IMAGE_BASE}:pr-${PR_NUM}"
          IMAGE_TAG_SHA="${IMAGE_BASE}:pr-${PR_NUM}-${{ github.sha }}"
          echo "image_tag_pr=${IMAGE_TAG_PR}" >> $GITHUB_OUTPUT
          echo "image_tag_sha=${IMAGE_TAG_SHA}" >> $GITHUB_OUTPUT
          echo "::notice::🚀 Building ARM64 PR #${PR_NUM} from branch '${BACKEND_BRANCH}'"
          echo "::notice::📦 Image: ${IMAGE_TAG_PR}"

      # Get the source code for the specific branch we're building
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.backend_branch }}

      # Speed up Rust compilation with cached dependencies
      - name: Setup Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "pr-preview-arm64"
          key: "arm64-${{ steps.context.outputs.backend_branch }}"
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/main' || github.event_name == 'pull_request' }}

      # Authenticate with GitHub Container Registry to push Docker images
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Set up Docker with BuildKit for advanced caching and multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # Check if we already built an image for this exact commit to avoid duplicate work
      - name: Check for Existing Image
        id: check_image
        run: |
          if docker manifest inspect ${{ steps.context.outputs.image_tag_sha }} >/dev/null 2>&1; then
            echo "image_exists=true" >> $GITHUB_OUTPUT
            echo "::notice::📦 Image already exists for SHA ${{ github.sha }}"
          else
            echo "image_exists=false" >> $GITHUB_OUTPUT
            echo "::notice::🔨 Building new ARM64 image for SHA ${{ github.sha }}"
          fi

      # Build the Docker image natively on ARM64 for best performance on RPi5
      # Uses multi-tier caching: PR image (if exists) → main-arm64 → GHA cache
      - name: Build and Push ARM64 Backend Image
        id: build_push
        if: steps.check_image.outputs.image_exists != 'true' || inputs.force_rebuild == true
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ steps.context.outputs.image_tag_pr }}
            ${{ steps.context.outputs.image_tag_sha }}
          cache-from: |
            type=registry,ref=${{ steps.context.outputs.image_tag_pr }}
            type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-arm64
            type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=Refactor Platform Backend PR-${{ steps.context.outputs.pr_number }}
            org.opencontainers.image.description=PR preview for branch ${{ steps.context.outputs.backend_branch }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            pr.number=${{ steps.context.outputs.pr_number }}
            pr.branch=${{ steps.context.outputs.backend_branch }}
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            CARGO_INCREMENTAL=${{ vars.CARGO_INCREMENTAL }}
            RUSTC_WRAPPER=${{ vars.RUSTC_WRAPPER }}
          provenance: true
          sbom: false

      # If image already exists, just tag it with the PR tag to avoid rebuilding
      - name: Tag Existing Image
        if: steps.check_image.outputs.image_exists == 'true' && inputs.force_rebuild != true
        run: |
          docker buildx imagetools create \
            --tag ${{ steps.context.outputs.image_tag_pr }} \
            ${{ steps.context.outputs.image_tag_sha }}

      # Show compilation cache statistics for debugging build performance
      - name: Display sccache Statistics
        if: always()
        run: |
          echo "::group::sccache final stats"
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats
          else
            echo "sccache not available"
          fi
          echo "::endgroup::"

      # Create cryptographic proof of how this image was built for security
      - name: Attest Build Provenance
        if: steps.build_push.conclusion == 'success'
        continue-on-error: true
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build_push.outputs.digest }}
          push-to-registry: true

  # ===========================================================================
  # JOB 4: Deploy to RPi5 via Tailscale VPN
  # ===========================================================================
  deploy-to-rpi5:
    name: Deploy to RPi5 via Tailscale
    runs-on: [self-hosted, Linux, ARM64, neo]
    needs: build-arm64-image
    environment: pr-preview

    steps:
      # Calculate unique port numbers for this PR to avoid conflicts
      - name: Calculate Deployment Ports
        id: ports
        run: |
          PR_NUM="${{ needs.build-arm64-image.outputs.pr_number }}"
          BACKEND_CONTAINER_PORT=${{ vars.BACKEND_PORT_BASE }}
          BACKEND_EXTERNAL_PORT=$((${{ vars.BACKEND_PORT_BASE }} + PR_NUM))
          POSTGRES_EXTERNAL_PORT=$((${{ vars.POSTGRES_PORT_BASE }} + PR_NUM))
          FRONTEND_EXTERNAL_PORT=$((${{ vars.FRONTEND_PORT_BASE }} + PR_NUM))
          echo "backend_container_port=${BACKEND_CONTAINER_PORT}" >> $GITHUB_OUTPUT
          echo "backend_port=${BACKEND_EXTERNAL_PORT}" >> $GITHUB_OUTPUT
          echo "postgres_port=${POSTGRES_EXTERNAL_PORT}" >> $GITHUB_OUTPUT
          echo "frontend_port=${FRONTEND_EXTERNAL_PORT}" >> $GITHUB_OUTPUT
          echo "project_name=pr-${PR_NUM}" >> $GITHUB_OUTPUT
          echo "::notice::🔌 Postgres: ${POSTGRES_EXTERNAL_PORT} | Backend: ${BACKEND_EXTERNAL_PORT} | Frontend: ${FRONTEND_EXTERNAL_PORT}"

      # Get the Docker Compose file for PR preview deployment
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.build-arm64-image.outputs.backend_branch }}

      # Verify we can reach the RPi5 through Tailscale VPN
      - name: Verify Tailscale Connection
        run: |
          # Tailscale is pre-installed and already connected on the self-hosted runner
          # Just verify the connection status
          echo "🔍 Checking Tailscale connection status..."
          tailscale status || echo "⚠️ Tailscale status check failed, but continuing..."
          echo "✅ Tailscale verification complete"

      # Set up SSH key and known hosts to connect securely to RPi5
      - name: Setup SSH Configuration
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.RPI5_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.RPI5_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Test SSH connection to RPi5 before attempting deployment
      - name: Test SSH Connection
        run: |
          echo "🔍 Testing SSH connection to ${{ secrets.RPI5_TAILSCALE_NAME }}..."
          if ! ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes -o ConnectTimeout=10 \
            -i ~/.ssh/id_ed25519 \
            ${{ secrets.RPI5_USERNAME }}@${{ secrets.RPI5_TAILSCALE_NAME }} \
            'echo "SSH connection successful"'; then
            echo "::error::SSH connection failed to ${{ secrets.RPI5_TAILSCALE_NAME }}"
            exit 1
          fi
          echo "::notice::✅ SSH connection verified"

      # Ensure the Postgres schema exists before running migrations
      - name: Prepare Postgres Schema
        run: |
          PR_NUMBER="${{ needs.build-arm64-image.outputs.pr_number }}"
          BACKEND_IMAGE="${{ needs.build-arm64-image.outputs.image_tag_pr }}"
          PROJECT_NAME="${{ steps.ports.outputs.project_name }}"

          echo "📦 Transferring compose file to RPi5 for schema preparation..."
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
            docker-compose.pr-preview.yaml \
            ${{ secrets.RPI5_USERNAME }}@${{ secrets.RPI5_TAILSCALE_NAME }}:/home/${{ secrets.RPI5_USERNAME }}/pr-${PR_NUMBER}-compose.yaml

          # Assemble environment configuration for the remote compose commands
          cat > /tmp/pr-${PR_NUMBER}.env << EOF
          PR_NUMBER=${PR_NUMBER}
          BACKEND_IMAGE=${BACKEND_IMAGE}
          PROJECT_NAME=${PROJECT_NAME}
          PR_POSTGRES_PORT=${{ steps.ports.outputs.postgres_port }}
          PR_BACKEND_PORT=${{ steps.ports.outputs.backend_port }}
          PR_BACKEND_CONTAINER_PORT=${{ steps.ports.outputs.backend_container_port }}
          PR_FRONTEND_PORT=${{ steps.ports.outputs.frontend_port }}
          POSTGRES_USER=$(echo '${{ secrets.PR_PREVIEW_POSTGRES_USER }}' | tr -d '\n\r' | tr -d ' ')
          POSTGRES_PASSWORD=$(echo '${{ secrets.PR_PREVIEW_POSTGRES_PASSWORD }}' | tr -d '\n\r' | tr -d ' ')
          POSTGRES_DB=$(echo '${{ secrets.PR_PREVIEW_POSTGRES_DB }}' | tr -d '\n\r' | tr -d ' ')
          POSTGRES_SCHEMA=$(echo '${{ secrets.PR_PREVIEW_POSTGRES_SCHEMA }}' | tr -d '\n\r' | tr -d ' ')
          RUST_ENV=${{ vars.RUST_ENV }}
          RUST_BACKTRACE=${{ vars.RUST_BACKTRACE }}
          BACKEND_INTERFACE=${{ vars.BACKEND_INTERFACE }}
          BACKEND_ALLOWED_ORIGINS=${{ vars.BACKEND_ALLOWED_ORIGINS }}
          BACKEND_LOG_FILTER_LEVEL=${{ vars.BACKEND_LOG_FILTER_LEVEL }}
          BACKEND_SESSION_EXPIRY_SECONDS=${{ vars.BACKEND_SESSION_EXPIRY_SECONDS }}
          TIPTAP_APP_ID=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_APP_ID }}' | tr -d '\n\r')
          TIPTAP_URL=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_URL }}' | tr -d '\n\r')
          TIPTAP_AUTH_KEY=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_AUTH_KEY }}' | tr -d '\n\r')
          TIPTAP_JWT_SIGNING_KEY=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_JWT_SIGNING_KEY }}' | tr -d '\n\r')
          MAILERSEND_API_KEY=$(echo '${{ secrets.PR_PREVIEW_MAILERSEND_API_KEY }}' | tr -d '\n\r')
          WELCOME_EMAIL_TEMPLATE_ID=$(echo '${{ secrets.PR_PREVIEW_WELCOME_EMAIL_TEMPLATE_ID }}' | tr -d '\n\r')
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR=${{ github.actor }}
          RPI5_USERNAME=${{ secrets.RPI5_USERNAME }}
          SERVICE_STARTUP_WAIT_SECONDS=${{ vars.SERVICE_STARTUP_WAIT_SECONDS }}
          EOF

          echo "📦 Transferring environment configuration to RPi5..."
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
            /tmp/pr-${PR_NUMBER}.env \
            ${{ secrets.RPI5_USERNAME }}@${{ secrets.RPI5_TAILSCALE_NAME }}:/home/${{ secrets.RPI5_USERNAME }}/pr-${PR_NUMBER}.env

          cat << 'PREP_SCRIPT' | ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
            ${{ secrets.RPI5_USERNAME }}@${{ secrets.RPI5_TAILSCALE_NAME }} \
            /bin/bash
          set -eo pipefail

          ENV_FILE=$(ls -t ~/pr-*.env 2>/dev/null | head -1)
          if [[ -f "$ENV_FILE" ]]; then
            echo "📥 Found environment file for schema prep: $ENV_FILE"
            # Load environment configuration for compose commands
            set -a
            source "$ENV_FILE"
            set +a
          else
            echo "❌ Environment file not found during schema preparation!"
            exit 1
          fi

          # Guard against accidentally running on the GitHub runner
          if [[ "$(hostname)" == *"runner"* ]] || [[ "$(pwd)" == *"runner"* ]]; then
            echo "❌ Schema preparation running on GitHub runner instead of target server!"
            exit 1
          fi

          cd /home/${RPI5_USERNAME}

          # Fully reset prior deployment state and drop any persisted volumes
          echo "🧹 Resetting previous deployment (including database volume)..."
          docker compose -p ${PROJECT_NAME} -f pr-${PR_NUMBER}-compose.yaml down -v 2>/dev/null || true

          # Start only Postgres so the schema can be provisioned cleanly
          echo "🐘 Starting postgres for schema preparation..."
          docker compose -p ${PROJECT_NAME} -f pr-${PR_NUMBER}-compose.yaml --env-file "$ENV_FILE" up -d postgres

          echo "⏳ Waiting for postgres to become ready..."
          READY=""
          for attempt in {1..30}; do
            if docker compose -p ${PROJECT_NAME} -f pr-${PR_NUMBER}-compose.yaml exec -T postgres \
              env PGPASSWORD="${POSTGRES_PASSWORD}" pg_isready -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" >/dev/null 2>&1; then
              READY="yes"
              break
            fi
            sleep 2
          done

          if [[ -z "$READY" ]]; then
            echo "❌ Postgres did not become ready in time"
            docker compose -p ${PROJECT_NAME} -f pr-${PR_NUMBER}-compose.yaml logs postgres || true
            exit 1
          fi

          # Create the schema, grant privileges, and set search_path every run
          echo "🛠 Ensuring schema ${POSTGRES_SCHEMA} exists and permissions are set..."
          docker compose -p ${PROJECT_NAME} -f pr-${PR_NUMBER}-compose.yaml exec -T postgres \
            env PGPASSWORD="${POSTGRES_PASSWORD}" psql -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" <<SQL
          CREATE SCHEMA IF NOT EXISTS "${POSTGRES_SCHEMA}";
          GRANT ALL PRIVILEGES ON DATABASE "${POSTGRES_DB}" TO "${POSTGRES_USER}";
          ALTER ROLE "${POSTGRES_USER}" SET search_path TO "${POSTGRES_SCHEMA}";
          SQL

          echo "✅ Schema preparation completed"
          PREP_SCRIPT

      # Deploy the PR preview environment to RPi5 via SSH
      - name: Deploy to RPi5 via Tailscale SSH
        run: |
          PR_NUMBER="${{ needs.build-arm64-image.outputs.pr_number }}"
          BACKEND_IMAGE="${{ needs.build-arm64-image.outputs.image_tag_pr }}"
          PROJECT_NAME="${{ steps.ports.outputs.project_name }}"

          # Copy Docker Compose file to RPi5
          echo "📦 Transferring compose file to RPi5..."
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
            docker-compose.pr-preview.yaml \
            ${{ secrets.RPI5_USERNAME }}@${{ secrets.RPI5_TAILSCALE_NAME }}:/home/${{ secrets.RPI5_USERNAME }}/pr-${PR_NUMBER}-compose.yaml

          echo "🚀 Deploying PR preview environment..."

          # Create environment file with all secrets and configuration for Docker Compose
          cat > /tmp/pr-${PR_NUMBER}.env << EOF
          PR_NUMBER=${PR_NUMBER}
          BACKEND_IMAGE=${BACKEND_IMAGE}
          PROJECT_NAME=${PROJECT_NAME}
          PR_POSTGRES_PORT=${{ steps.ports.outputs.postgres_port }}
          PR_BACKEND_PORT=${{ steps.ports.outputs.backend_port }}
          PR_BACKEND_CONTAINER_PORT=${{ steps.ports.outputs.backend_container_port }}
          PR_FRONTEND_PORT=${{ steps.ports.outputs.frontend_port }}
          POSTGRES_USER=$(echo '${{ secrets.PR_PREVIEW_POSTGRES_USER }}' | tr -d '\n\r' | tr -d ' ')
          POSTGRES_PASSWORD=$(echo '${{ secrets.PR_PREVIEW_POSTGRES_PASSWORD }}' | tr -d '\n\r' | tr -d ' ')
          POSTGRES_DB=$(echo '${{ secrets.PR_PREVIEW_POSTGRES_DB }}' | tr -d '\n\r' | tr -d ' ')
          POSTGRES_SCHEMA=$(echo '${{ secrets.PR_PREVIEW_POSTGRES_SCHEMA }}' | tr -d '\n\r' | tr -d ' ')
          RUST_ENV=${{ vars.RUST_ENV }}
          RUST_BACKTRACE=${{ vars.RUST_BACKTRACE }}
          BACKEND_INTERFACE=${{ vars.BACKEND_INTERFACE }}
          BACKEND_ALLOWED_ORIGINS=${{ vars.BACKEND_ALLOWED_ORIGINS }}
          TIPTAP_AUTH_KEY=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_AUTH_KEY }}' | tr -d '\n\r')
          TIPTAP_JWT_SIGNING_KEY=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_JWT_SIGNING_KEY }}' | tr -d '\n\r')
          TIPTAP_APP_ID=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_APP_ID }}' | tr -d '\n\r')
          TIPTAP_URL=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_URL }}' | tr -d '\n\r')
          TIPTAP_AUTH_KEY=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_AUTH_KEY }}' | tr -d '\n\r')
          TIPTAP_JWT_SIGNING_KEY=$(echo '${{ secrets.PR_PREVIEW_TIPTAP_JWT_SIGNING_KEY }}' | tr -d '\n\r')
          MAILERSEND_API_KEY=$(echo '${{ secrets.PR_PREVIEW_MAILERSEND_API_KEY }}' | tr -d '\n\r')
          WELCOME_EMAIL_TEMPLATE_ID=$(echo '${{ secrets.PR_PREVIEW_WELCOME_EMAIL_TEMPLATE_ID }}' | tr -d '\n\r')
          GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR=${{ github.actor }}
          RPI5_USERNAME=${{ secrets.RPI5_USERNAME }}
          SERVICE_STARTUP_WAIT_SECONDS=${{ vars.SERVICE_STARTUP_WAIT_SECONDS }}
          EOF

          # Copy environment file to RPi5
          scp -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
            /tmp/pr-${PR_NUMBER}.env \
            ${{ secrets.RPI5_USERNAME }}@${{ secrets.RPI5_TAILSCALE_NAME }}:/home/${{ secrets.RPI5_USERNAME }}/pr-${PR_NUMBER}.env

          # Execute the actual deployment commands on RPi5
          cat << 'DEPLOY_SCRIPT' | ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
            ${{ secrets.RPI5_USERNAME }}@${{ secrets.RPI5_TAILSCALE_NAME }} \
            /bin/bash
          set -eo pipefail

          # Load all environment variables from the file we just transferred
          ENV_FILE=$(ls -t ~/pr-*.env 2>/dev/null | head -1)
          if [[ -f "$ENV_FILE" ]]; then
            echo "📥 Found environment file: $ENV_FILE"
            # Export variables so compose and helper commands share configuration
            set -a
            source "$ENV_FILE"
            set +a
          else
            echo "❌ Environment file not found!"
            exit 1
          fi

          # Guard against accidentally running on the GitHub runner
          if [[ "$(hostname)" == *"runner"* ]] || [[ "$(pwd)" == *"runner"* ]]; then
            echo "❌ Script running on GitHub runner instead of target server!"
            exit 1
          fi

          cd /home/${RPI5_USERNAME}

          # Authenticate with GHCR so the newest image pulls successfully
          echo "📦 Logging into GHCR..."
          echo "${GITHUB_TOKEN}" | docker login ghcr.io -u ${GITHUB_ACTOR} --password-stdin

          # Pull the PR-specific backend image prior to compose startup
          echo "📥 Pulling image: ${BACKEND_IMAGE}..."
          docker pull ${BACKEND_IMAGE}

          # Launch the full stack using the prepared environment file
          echo "🚀 Starting PR preview environment..."
          docker compose -p ${PROJECT_NAME} -f pr-${PR_NUMBER}-compose.yaml --env-file "$ENV_FILE" up -d

          # Give services a brief warm-up period before validation checks
          echo "⏳ Waiting ${SERVICE_STARTUP_WAIT_SECONDS} seconds for services..."
          sleep ${SERVICE_STARTUP_WAIT_SECONDS}

          # Show container state for observability
          echo "🩺 Deployment status:"
          docker compose -p ${PROJECT_NAME} ps

          # Confirm migrations completed successfully and dump recent logs
          echo "📜 Checking migration status..."
          MIGRATOR_EXIT_CODE=$(docker inspect ${PROJECT_NAME}-migrator-1 --format='{{.State.ExitCode}}' 2>/dev/null || echo "255")
          docker logs ${PROJECT_NAME}-migrator-1 2>&1 | tail -20

          if [[ "${MIGRATOR_EXIT_CODE}" != "0" ]]; then
            echo "❌ Migration failed with exit code: ${MIGRATOR_EXIT_CODE}"
            echo "📜 Full migration logs:"
            docker logs ${PROJECT_NAME}-migrator-1 2>&1
            exit 1
          fi
          echo "✅ Migrations completed successfully"

          # Validate that the backend service is healthy and running
          echo "📜 Checking backend status..."
          BACKEND_STATUS=$(docker inspect ${PROJECT_NAME}-backend-1 --format='{{.State.Status}}' 2>/dev/null || echo "missing")
          docker logs ${PROJECT_NAME}-backend-1 2>&1 | tail -20

          if [[ "${BACKEND_STATUS}" != "running" ]]; then
            echo "❌ Backend is not running (status: ${BACKEND_STATUS})"
            echo "📜 Full backend logs:"
            docker logs ${PROJECT_NAME}-backend-1 2>&1
            exit 1
          fi

          # Check if backend is in a crash loop (restarting repeatedly)
          BACKEND_RESTART_COUNT=$(docker inspect ${PROJECT_NAME}-backend-1 --format='{{.State.RestartCount}}' 2>/dev/null || echo "0")
          if [[ "${BACKEND_RESTART_COUNT}" -gt "0" ]]; then
            echo "⚠️  Backend has restarted ${BACKEND_RESTART_COUNT} time(s) - checking for crash loop"
            sleep 5
            BACKEND_STATUS_RECHECK=$(docker inspect ${PROJECT_NAME}-backend-1 --format='{{.State.Status}}' 2>/dev/null || echo "missing")
            if [[ "${BACKEND_STATUS_RECHECK}" != "running" ]]; then
              echo "❌ Backend is crash looping"
              echo "📜 Full backend logs:"
              docker logs ${PROJECT_NAME}-backend-1 2>&1
              exit 1
            fi
          fi

          echo "✅ Backend is running successfully"
          echo "✅ Deployment complete!"

          # Remove the copied env file from disk now that deployment finished
          rm -f "$ENV_FILE"
          DEPLOY_SCRIPT

      # Post a comment on the PR with links to access the preview environment
      - name: Comment on PR with Preview URLs
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = ${{ needs.build-arm64-image.outputs.pr_number }};
            const backendPort = ${{ steps.ports.outputs.backend_port }};
            const postgresPort = ${{ steps.ports.outputs.postgres_port }};
            const frontendPort = ${{ steps.ports.outputs.frontend_port }};
            const backendBranch = '${{ needs.build-arm64-image.outputs.backend_branch }}';
            const imageTag = '${{ needs.build-arm64-image.outputs.image_tag_pr }}';
            const isNativeArm64 = '${{ needs.build-arm64-image.outputs.is_native_arm64 }}' === 'true';
            const backendUrl = `http://${{ secrets.RPI5_TAILSCALE_NAME }}:${backendPort}`;
            const frontendUrl = `http://${{ secrets.RPI5_TAILSCALE_NAME }}:${frontendPort}`;

            const comment = `## 🚀 PR Preview Environment Deployed!

            ### 🔗 Access URLs
            | Service | URL |
            |---------|-----|
            | **Frontend** | [${frontendUrl}](${frontendUrl}) |
            | **Backend API** | [${backendUrl}](${backendUrl}) |
            | **Health Check** | [${backendUrl}/health](${backendUrl}/health) |

            ### 📊 Environment Details
            - **PR Number:** #${prNumber}
            - **Backend Branch:** \`${backendBranch}\`
            - **Commit:** \`${{ github.sha }}\`
            - **Image:** \`${imageTag}\`
            - **Ports:** Frontend: ${frontendPort} | Backend: ${backendPort} | Postgres: ${postgresPort}
            - **Build Type:** ${isNativeArm64 ? '🚀 Native ARM64' : '⚠️ ARM64 Emulation'}

            ### 🔐 Access Requirements
            1. **Connect to Tailscale** (required)
            2. Access frontend: ${frontendUrl}
            3. Access backend: ${backendUrl}

            ### 🧪 Testing
            \`\`\`bash
            # Health check
            curl ${backendUrl}/health

            # API test
            curl ${backendUrl}/api/v1/...
            \`\`\`

            ### 🧹 Cleanup
            _Environment auto-cleaned when PR closes/merges_

            ---
            *Deployed: ${new Date().toISOString()}*
            *Optimizations: Native ARM64 build on Neo + sccache + Rust cache + Docker BuildKit*`;

            // Find and delete any existing preview comments to keep the UI clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('PR Preview Environment')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
              });
            }

            // Post a fresh comment which will appear below the most recent commit
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: comment,
            });

      # Show deployment summary for manual workflow runs
      - name: Display Deployment Summary
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "::notice::✅ Deployment complete!"
          echo "::notice::🌐 Frontend: http://${{ secrets.RPI5_TAILSCALE_NAME }}:${{ steps.ports.outputs.frontend_port }}"
          echo "::notice::🌐 Backend: http://${{ secrets.RPI5_TAILSCALE_NAME }}:${{ steps.ports.outputs.backend_port }}"
          echo "::notice::🗄️ Postgres: ${{ secrets.RPI5_TAILSCALE_NAME }}:${{ steps.ports.outputs.postgres_port }}"
          echo "::notice::📦 Image: ${{ needs.build-arm64-image.outputs.image_tag_pr }}"
          echo "::notice::🏗️  Build: Native ARM64 on Neo"

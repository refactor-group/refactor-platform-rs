name: Build and Deploy Containers

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BACKEND_IMAGE_NAME: rust-backend
  FRONTEND_IMAGE_NAME: nextjs-frontend

jobs:
  build_test_run:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust + QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: linux/amd64,linux/arm64

      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Set up Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Install sea-orm-cli
        run: cargo install sea-orm-cli

      - name: Set linker for cross-compilation
        run: |
          mkdir -p ~/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build release binaries
        run: cargo build --release --workspace --target aarch64-unknown-linux-gnu

      - name: Run tests
        run: cargo test --release

  build_and_push_docker:
    runs-on: ubuntu-22.04
    needs: build_test_run
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Determine Image Tags
        id: tags
        run: |
          TAGS="${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}:latest"
          FTAGS="${{ env.REGISTRY }}/${{ github.repository }}/${{ env.FRONTEND_IMAGE_NAME }}:latest"

          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAGS="$TAGS,${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"
            FTAGS="$FTAGS,${{ env.REGISTRY }}/${{ github.repository }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}"
          fi

          echo "backend_tags=$TAGS" >> $GITHUB_OUTPUT
          echo "frontend_tags=$FTAGS" >> $GITHUB_OUTPUT

      - name: Build + Push Backend
        id: push_backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          tags: ${{ steps.tags.outputs.backend_tags }}

      - name: Build + Push Frontend
        id: push_frontend
        uses: docker/build-push-action@v5
        with:
          context: web
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          build-args: |
            BACKEND_URL=${{ secrets.BACKEND_URL }}
          tags: ${{ steps.tags.outputs.frontend_tags }}

      - name: Attest Backend
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}
          subject-digest: ${{ steps.push_backend.outputs.digest }}
          push-to-registry: true

      - name: Attest Frontend
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.FRONTEND_IMAGE_NAME }}
          subject-digest: ${{ steps.push_frontend.outputs.digest }}
          push-to-registry: true

      - name: Print Usage Instructions
        run: |
          echo "✅ Backend:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}:latest"
          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "  docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}"
          fi
          echo ""
          echo "✅ Frontend:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.FRONTEND_IMAGE_NAME }}:latest"
          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "  docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.FRONTEND_IMAGE_NAME }}:${{ github.sha }}"
          fi
          echo ""
          echo "▶️ Run Backend:"
          echo "  docker run --rm -p 8000:8000 ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}:latest"

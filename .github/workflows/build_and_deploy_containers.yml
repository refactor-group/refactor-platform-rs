name: Build and Deploy Containers

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BACKEND_IMAGE_NAME: rust-backend

jobs:
  build_test_run:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Enable emulation for multi-arch builds (amd64 + arm64)
      - name: Set up Rust + QEMU
        uses: docker/setup-qemu-action@v2
        with:
          platforms: linux/amd64,linux/arm64

      # Install the cross-compiler needed for ARM builds
      - name: Install cross-compilation toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      # Add required Rust targets for cross-compilation
      - name: Set up Rust targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu

      # Cache Cargo build artifacts to speed up builds
      - uses: Swatinem/rust-cache@v2

      - name: Install sea-orm-cli
        run: cargo install sea-orm-cli

      # Tell Cargo to use the correct linker for aarch64
      - name: Set linker for cross-compilation
        run: |
          mkdir -p ~/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      # Build all Rust binaries for aarch64 target
      - name: Build release binaries
        run: cargo build --release --workspace --target aarch64-unknown-linux-gnu

      # Run tests (runs on native x86_64 target)
      - name: Run tests
        run: cargo test --release

  build_and_push_docker:
    runs-on: ubuntu-22.04
    needs: build_test_run
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      # Log in to GitHub Container Registry
      - name: Docker login
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Generate dynamic tags: branch-name and latest (if main)
      - name: Determine Image Tags
        id: tags
        run: |
          REPO=${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}
          BRANCH_TAG=${GITHUB_REF##*/}
          TAGS="$REPO:$BRANCH_TAG"

          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            TAGS="$TAGS,$REPO:latest"
          fi

          echo "backend_tags=$TAGS" >> $GITHUB_OUTPUT

      # Build and push backend image for multi-platform (amd64 + arm64)
      - name: Build + Push Backend
        id: push_backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          tags: ${{ steps.tags.outputs.backend_tags }}

      # Generate build attestation (only for main)
      - name: Attest Backend
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}
          subject-digest: ${{ steps.push_backend.outputs.digest }}
          push-to-registry: true

      # Output pull/run instructions
      - name: Print Usage Instructions
        run: |
          echo "✅ Backend:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}:${GITHUB_REF##*/}"
          if [[ "${GITHUB_REF}" == "refs/heads/main" && "${GITHUB_EVENT_NAME}" == "push" ]]; then
            echo "  docker pull ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}:latest"
          fi
          echo ""
          echo "▶️ Run Backend:"
          echo "  docker run --rm -p 8000:8000 ${{ env.REGISTRY }}/${{ github.repository }}/${{ env.BACKEND_IMAGE_NAME }}:${GITHUB_REF##*/}"

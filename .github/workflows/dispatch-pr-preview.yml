# =============================================================================
# Manual PR Preview Deployment with Commit Selection
# =============================================================================
# Purpose: Allow users to manually deploy a PR preview environment with specific
#          commit combinations from both backend and frontend repos.
# Usage: Go to Actions tab → select this workflow → choose a PR branch from the
#        backend commit dropdown → choose frontend commit → Run workflow
# Requires: Select a PR branch entry from the backend commit dropdown (PR# is
#           extracted automatically from the selection).
# Dropdown choices: Auto-updated by refresh-preview-commits.yml on merge to main
#                   or via manual workflow_dispatch. Use the override inputs for exact SHAs.
# =============================================================================

name: Deploy PR Preview (Manual Select)
on:
  workflow_dispatch:
    inputs:
      backend_commit:
        description: "Backend commit to deploy"
        required: true
        type: choice
        options:
          - 37aaa54 - Add `invite_status` to user model (#281)
          - 'f5b43a9 - chore: refresh preview commit choices [skip ci]'
          - 3f90fae - Implements magic login links (#273)
          - 7cdfdda - PR#287 (goal-progress-query-params)
          - c7592a3 - PR#286 (raymond/bug/fix-misleading-ext)
          - 14bfc7c - PR#279 (dependabot/cargo/cargo-39cecc6)
          - 4632ee2 - PR#278 (raymond/fix-google-provider-co)
          - a51652a - PR#254 (ai-transcription-milestone-2)
          - dcaf354 - PR#213 (feature/146-ai-meeting-integra)
      frontend_commit:
        description: "Frontend commit to deploy"
        required: true
        type: choice
        options:
          - '5d3ca4a - chore: refresh preview commit choices [skip ci]'
          - 'bda41ec - Merge pull request #367 from refactor-group/raymond/imp'
          - 9cbb879 - Merge branch 'raymond/implements-magic-logins' of githu
          - 0ede2a2 - PR#373 (feature/transcript-pane)
          - 4b0c05e - PR#336 (feat/dashboard-goals-overview)
          - 3b36667 - PR#318 (docs/goals-implementation-plan)
          - 9e30ca1 - PR#315 (improve-nullable-types)
          - d9e1e08 - PR#243 (feature/146-ai-meeting-integra)
      backend_commit_override:
        description: "Override: paste exact backend SHA (ignores dropdown)"
        required: false
        type: string
        default: ""
      frontend_commit_override:
        description: "Override: paste exact frontend SHA (ignores dropdown)"
        required: false
        type: string
        default: ""
# Prevent multiple manual deployments for the same PR
concurrency:
  group: pr-preview-backend-dispatch-${{ inputs.backend_commit }}
  cancel-in-progress: true
permissions:
  contents: read
  packages: write
  pull-requests: write
  attestations: write
  id-token: write
jobs:
  # ===========================================================================
  # JOB 1: Validate inputs and resolve commit SHAs
  # ===========================================================================
  validate:
    name: Validate PR & Resolve Commits
    runs-on: ubuntu-latest
    outputs:
      backend_sha: ${{ steps.resolve.outputs.backend_sha }}
      frontend_sha: ${{ steps.resolve.outputs.frontend_sha }}
      branch_name: ${{ steps.resolve.outputs.branch_name }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
    steps:
      - name: Validate PR and resolve commit SHAs
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_BACKEND_COMMIT: ${{ inputs.backend_commit }}
          INPUT_FRONTEND_COMMIT: ${{ inputs.frontend_commit }}
          INPUT_BACKEND_OVERRIDE: ${{ inputs.backend_commit_override }}
          INPUT_FRONTEND_OVERRIDE: ${{ inputs.frontend_commit_override }}
          OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          # Extract PR number from backend commit selection (calling repo)
          # Dropdown PR entries use format: "SHA - PR#NNN (branch-name)"
          if [[ "$INPUT_BACKEND_COMMIT" =~ PR#([0-9]+) ]]; then
              PR_NUMBER="${BASH_REMATCH[1]}"
              echo "::notice::Extracted PR #$PR_NUMBER from backend commit selection"
          else
              echo "::error::Selected backend commit is not a PR entry. Select a PR branch (format: 'SHA - PR#NNN (branch)') to deploy a preview."
              exit 1
          fi

          # Validate PR number is numeric
          if ! [[ "$PR_NUMBER" =~ ^[0-9]+$ ]]; then
              echo "::error::PR number must be numeric, got: $PR_NUMBER"
              exit 1
          fi

          # Validate PR exists and is open (draft or regular)
          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "$OWNER/refactor-platform-rs" \
              --json state,isDraft,headRefName 2>&1) || {
              echo "::error::PR #$PR_NUMBER not found in $OWNER/refactor-platform-rs"
              exit 1
          }

          PR_STATE=$(echo "$PR_JSON" | jq -r '.state')
          PR_IS_DRAFT=$(echo "$PR_JSON" | jq -r '.isDraft')
          BRANCH_NAME=$(echo "$PR_JSON" | jq -r '.headRefName')

          if [[ "$PR_STATE" != "OPEN" ]]; then
              echo "::error::PR #$PR_NUMBER is $PR_STATE (must be OPEN). Draft PRs are allowed."
              exit 1
          fi
          echo "::notice::PR #$PR_NUMBER is valid (state: $PR_STATE, draft: $PR_IS_DRAFT, branch: $BRANCH_NAME)"

          # Parse backend SHA from dropdown choice (format: "SHORT_SHA - commit message")
          BACKEND_SHORT_SHA=$(echo "$INPUT_BACKEND_COMMIT" | cut -d' ' -f1)
          FRONTEND_SHORT_SHA=$(echo "$INPUT_FRONTEND_COMMIT" | cut -d' ' -f1)

          # Override with exact SHA if provided
          if [[ -n "$INPUT_BACKEND_OVERRIDE" ]]; then
              BACKEND_SHORT_SHA="$INPUT_BACKEND_OVERRIDE"
              echo "::notice::Using backend SHA override: $BACKEND_SHORT_SHA"
          fi
          if [[ -n "$INPUT_FRONTEND_OVERRIDE" ]]; then
              FRONTEND_SHORT_SHA="$INPUT_FRONTEND_OVERRIDE"
              echo "::notice::Using frontend SHA override: $FRONTEND_SHORT_SHA"
          fi

          # Validate SHA format for overrides (hex only, 7-40 chars)
          if [[ -n "$INPUT_BACKEND_OVERRIDE" ]] && ! [[ "$INPUT_BACKEND_OVERRIDE" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              echo "::error::Backend SHA override must be a valid hex SHA (7-40 chars)"
              exit 1
          fi
          if [[ -n "$INPUT_FRONTEND_OVERRIDE" ]] && ! [[ "$INPUT_FRONTEND_OVERRIDE" =~ ^[0-9a-fA-F]{7,40}$ ]]; then
              echo "::error::Frontend SHA override must be a valid hex SHA (7-40 chars)"
              exit 1
          fi

          # Validate "pending" placeholder hasn't been selected
          if [[ "$BACKEND_SHORT_SHA" == "pending" ]]; then
              echo "::error::Backend commit choices not yet populated. Run the 'Refresh Preview Commits' workflow first, or use the override input."
              exit 1
          fi
          if [[ "$FRONTEND_SHORT_SHA" == "pending" ]]; then
              echo "::error::Frontend commit choices not yet populated. Run the 'Refresh Preview Commits' workflow first, or use the override input."
              exit 1
          fi

          # Resolve short SHAs to full SHAs (validates they exist)
          BACKEND_FULL_SHA=$(gh api "repos/$OWNER/refactor-platform-rs/commits/$BACKEND_SHORT_SHA" \
              --jq '.sha' 2>&1) || {
              echo "::error::Backend commit '$BACKEND_SHORT_SHA' not found in $OWNER/refactor-platform-rs"
              exit 1
          }
          FRONTEND_FULL_SHA=$(gh api "repos/$OWNER/refactor-platform-fe/commits/$FRONTEND_SHORT_SHA" \
              --jq '.sha' 2>&1) || {
              echo "::error::Frontend commit '$FRONTEND_SHORT_SHA' not found in $OWNER/refactor-platform-fe"
              exit 1
          }

          echo "::notice::Backend commit resolved: ${BACKEND_FULL_SHA:0:7}"
          echo "::notice::Frontend commit resolved: ${FRONTEND_FULL_SHA:0:7}"

          echo "backend_sha=$BACKEND_FULL_SHA" >> $GITHUB_OUTPUT
          echo "frontend_sha=$FRONTEND_FULL_SHA" >> $GITHUB_OUTPUT
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT
  # ===========================================================================
  # JOB 2: Deploy using the reusable workflow
  # ===========================================================================
  deploy:
    name: Deploy PR Preview
    needs: validate
    uses: ./.github/workflows/ci-deploy-pr-preview.yml
    with:
      repo_type: "backend"
      pr_number: ${{ needs.validate.outputs.pr_number }}
      branch_name: ${{ needs.validate.outputs.branch_name }}
      backend_sha: ${{ needs.validate.outputs.backend_sha }}
      frontend_sha: ${{ needs.validate.outputs.frontend_sha }}
      force_rebuild: false
    secrets: inherit

# =============================================================================
# Reusable PR Preview Cleanup Workflow
# =============================================================================
# Purpose: Clean up PR preview environments when PR is closed/merged
# Features: Remove containers, volumes, images (except postgres and main images)
# Target: Raspberry Pi 5 (ARM64) via Tailscale SSH
# Used by: Both refactor-platform-rs and refactor-platform-fe repositories
# =============================================================================

name: Cleanup PR Preview Environment

on:
    workflow_call:
        inputs:
            # Determines whether this is a backend or frontend cleanup
            repo_type:
                description: "Repository type: 'backend' or 'frontend'"
                required: true
                type: string
            # PR number for identifying environment to cleanup
            pr_number:
                description: "PR number to cleanup"
                required: true
                type: string
            # Branch name (for image cleanup)
            branch_name:
                description: "Branch name for image cleanup"
                required: true
                type: string

    # Allow manual execution for testing
    workflow_dispatch:
        inputs:
            repo_type:
                description: "Repository type: 'backend' or 'frontend'"
                required: true
                type: string
            pr_number:
                description: "PR number to cleanup"
                required: true
                type: string
            branch_name:
                description: "Branch name for image cleanup"
                required: true
                type: string

# Define what GitHub resources this workflow can access
permissions:
    contents: read
    packages: write
    pull-requests: write

# Set environment variables that apply to all jobs
env:
    REGISTRY: ghcr.io
    BACKEND_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/refactor-platform-rs
    FRONTEND_IMAGE_REPO: ghcr.io/${{ github.repository_owner }}/refactor-platform-fe

jobs:
    # ===========================================================================
    # JOB: Cleanup RPi5 Environment
    # ===========================================================================
    cleanup-rpi5:
        name: Cleanup RPi5 Environment
        runs-on: [self-hosted, Linux, ARM64, neo]
        # Always use pr-preview environment from backend repo for secrets
        environment: pr-preview

        steps:
            # Calculate project name and identify resources
            - name: Calculate Cleanup Parameters
              id: params
              run: |
                  PR_NUM="${{ inputs.pr_number }}"
                  PROJECT_NAME="pr-${PR_NUM}"

                  # Validate PR number
                  if [[ -z "$PR_NUM" ]]; then
                      echo "::error::PR number is required"
                      exit 1
                  fi
                  if ! [[ $PR_NUM =~ ^[0-9]+$ ]]; then
                      echo "::error::PR number must be numeric"
                      exit 1
                  fi

                  echo "project_name=${PROJECT_NAME}" >> $GITHUB_OUTPUT
                  echo "pr_number=${PR_NUM}" >> $GITHUB_OUTPUT

                  echo "::notice::🧹 Cleaning up environment for PR #${PR_NUM}"

            # Configure SSH for RPi5 connection
            - name: Setup SSH Configuration
              run: |
                  mkdir -p ~/.ssh
                  chmod 700 ~/.ssh
                  echo "${{ secrets.RPI5_SSH_KEY }}" > ~/.ssh/id_ed25519
                  chmod 600 ~/.ssh/id_ed25519
                  echo "${{ secrets.RPI5_HOST_KEY }}" >> ~/.ssh/known_hosts
                  chmod 644 ~/.ssh/known_hosts

            # Stop and remove Docker Compose project on RPi5
            - name: Cleanup Docker Environment on RPi5
              run: |
                  PROJECT_NAME="${{ steps.params.outputs.project_name }}"
                  PR_NUM="${{ steps.params.outputs.pr_number }}"

                  echo "🗑️  Cleaning up Docker environment for ${PROJECT_NAME}..."

                  ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
                      ${{ secrets.RPI5_USERNAME }}@${{ secrets.RPI5_TAILSCALE_NAME }} << 'CLEANUP_SCRIPT'
                  set -eo pipefail

                  # Safety check: ensure we're on target server
                  if [[ "$(hostname)" == *"runner"* ]] || [[ "$(pwd)" == *"runner"* ]]; then
                      echo "❌ Cleanup script running on GitHub runner instead of target server!"
                      exit 1
                  fi

                  cd /home/${{ secrets.RPI5_USERNAME }}

                  # Stop and remove all containers and volumes for this PR
                  if [[ -f "pr-${{ steps.params.outputs.pr_number }}-compose.yaml" ]]; then
                      echo "🛑 Stopping and removing containers and volumes..."
                      docker compose -p ${{ steps.params.outputs.project_name }} -f pr-${{ steps.params.outputs.pr_number }}-compose.yaml down -v 2>/dev/null || true

                      # Remove compose file
                      echo "🗑️  Removing compose file..."
                      rm -f pr-${{ steps.params.outputs.pr_number }}-compose.yaml
                  else
                      echo "⚠️  No compose file found for PR #${{ steps.params.outputs.pr_number }}"
                  fi

                  # Remove environment file
                  if [[ -f "pr-${{ steps.params.outputs.pr_number }}.env" ]]; then
                      echo "🗑️  Removing environment file..."
                      rm -f pr-${{ steps.params.outputs.pr_number }}.env
                  fi

                  # Clean up any dangling containers for this PR (safety net)
                  echo "🔍 Checking for dangling containers..."
                  docker ps -a --filter "name=${{ steps.params.outputs.project_name }}-" --format "{{.Names}}" | while read container; do
                      if [[ -n "$container" ]]; then
                          echo "🗑️  Removing dangling container: $container"
                          docker rm -f "$container" 2>/dev/null || true
                      fi
                  done

                  # Clean up any dangling volumes for this PR (safety net)
                  echo "🔍 Checking for dangling volumes..."
                  docker volume ls --filter "name=${{ steps.params.outputs.project_name }}_" --format "{{.Name}}" | while read volume; do
                      if [[ -n "$volume" ]]; then
                          echo "🗑️  Removing dangling volume: $volume"
                          docker volume rm "$volume" 2>/dev/null || true
                      fi
                  done

                  echo "✅ RPi5 environment cleanup complete"
                  CLEANUP_SCRIPT

            # Remove PR-specific images from RPi5 (but keep main images)
            - name: Cleanup PR Images on RPi5
              run: |
                  PR_NUM="${{ steps.params.outputs.pr_number }}"

                  echo "🗑️  Removing PR-specific images from RPi5..."

                  ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 \
                      ${{ secrets.RPI5_USERNAME }}@${{ secrets.RPI5_TAILSCALE_NAME }} << 'IMAGE_CLEANUP'
                  set -eo pipefail

                  # Remove backend PR images (keep main-arm64)
                  echo "🔍 Looking for backend PR images..."
                  docker images "${{ env.BACKEND_IMAGE_REPO }}" --format "{{.Repository}}:{{.Tag}}" | \
                      grep -E "pr-${{ steps.params.outputs.pr_number }}" | while read image; do
                      if [[ -n "$image" ]]; then
                          echo "🗑️  Removing image: $image"
                          docker rmi "$image" 2>/dev/null || true
                      fi
                  done

                  # Remove frontend PR images (keep main-arm64)
                  echo "🔍 Looking for frontend PR images..."
                  docker images "${{ env.FRONTEND_IMAGE_REPO }}" --format "{{.Repository}}:{{.Tag}}" | \
                      grep -E "pr-${{ steps.params.outputs.pr_number }}" | while read image; do
                      if [[ -n "$image" ]]; then
                          echo "🗑️  Removing image: $image"
                          docker rmi "$image" 2>/dev/null || true
                      fi
                  done

                  # Do NOT remove postgres images (used across PRs)
                  # Do NOT remove main-arm64 images (used for caching)

                  echo "✅ PR image cleanup complete"
                  IMAGE_CLEANUP

    # ===========================================================================
    # JOB: Cleanup GHCR Images
    # ===========================================================================
    cleanup-ghcr:
        name: Cleanup GHCR Images
        runs-on: ubuntu-24.04
        # Always use pr-preview environment from backend repo
        environment: pr-preview
        # Run after RPi5 cleanup
        needs: cleanup-rpi5

        steps:
            # Delete PR-specific images from GitHub Container Registry
            - name: Delete PR Images from GHCR
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  PR_NUM="${{ inputs.pr_number }}"

                  echo "🗑️  Deleting PR images from GHCR..."

                  # Function to delete image version if it exists
                  delete_image_version() {
                      local package_name=$1
                      local version_tag=$2
                      local repo_owner="${{ github.repository_owner }}"

                      echo "🔍 Checking for ${package_name}:${version_tag}..."

                      # Get version ID for the tag
                      VERSION_ID=$(gh api \
                          -H "Accept: application/vnd.github+json" \
                          -H "X-GitHub-Api-Version: 2022-11-28" \
                          "/orgs/${repo_owner}/packages/container/${package_name}/versions" \
                          --jq ".[] | select(.metadata.container.tags[] == \"${version_tag}\") | .id" \
                          2>/dev/null || echo "")

                      if [[ -n "$VERSION_ID" ]]; then
                          echo "🗑️  Deleting ${package_name}:${version_tag} (ID: ${VERSION_ID})..."
                          gh api \
                              --method DELETE \
                              -H "Accept: application/vnd.github+json" \
                              -H "X-GitHub-Api-Version: 2022-11-28" \
                              "/orgs/${repo_owner}/packages/container/${package_name}/versions/${VERSION_ID}" \
                              2>/dev/null && echo "✅ Deleted ${package_name}:${version_tag}" || echo "⚠️  Failed to delete ${package_name}:${version_tag}"
                      else
                          echo "ℹ️  Image ${package_name}:${version_tag} not found or already deleted"
                      fi
                  }

                  # Delete backend PR images
                  echo "🔍 Cleaning up backend images..."
                  delete_image_version "refactor-platform-rs" "pr-${PR_NUM}"

                  # Delete frontend PR images
                  echo "🔍 Cleaning up frontend images..."
                  delete_image_version "refactor-platform-fe" "pr-${PR_NUM}"

                  # Do NOT delete main-arm64 images (used for layer caching)

                  echo "✅ GHCR cleanup complete"
